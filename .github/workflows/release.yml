name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Dycast Desktop v__VERSION__'
          releaseBody: |
            ## 重点更新

            - 优化弹幕解析模型加载，将大型 protobuf 模型拆分为按需加载模块，降低首屏负担。
            - 优化弹幕列表渲染和滚动状态判断，降低大量消息场景下的响应式开销。
            - 改进 Tauri HTTP 和 WebSocket 适配，增强直播间信息获取、转发连接和异常状态处理。
            - 修复 WebSocket 转发在桌面端以二进制帧发送 JSON 的问题，现在转发数据以 text message 发送。
            - 补充 WebSocket 转发数据结构文档，明确直播间信息对象和 `DyMessage[]` 弹幕批次格式。
            - 压缩内置 emoji 映射数据，减少源码体积。

            ## 下载

            请在下方 Assets 中下载对应系统安装包。
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
