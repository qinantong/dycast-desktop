name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Dycast Desktop v__VERSION__'
          releaseBody: |
            ## 新增

            - **WebSocket 转发消息类型过滤** — 设置面板新增转发消息类型开关，可选择只转发聊天、礼物、点赞、进场等特定类型的消息，减少无关流量

            ## 修复

            - **修复自动更新下载失败** — 修复点击"立即更新"时报错的问题，Tauri updater 的 Update 类使用 JS 私有字段，与 Vue 响应式 Proxy 不兼容

            ## 工程

            - CI: 精简为单 job，由 tauri-action 自动生成 latest.json，不再上传 .sig 文件
            - 取消 darwin-x86_64 构建支持，仅保留 darwin-aarch64

            ## 下载

            请在下方 Assets 中下载对应系统安装包。
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          uploadUpdaterJson: true
          uploadUpdaterSignatures: false
