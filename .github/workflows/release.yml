name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Dycast Desktop v__VERSION__'
          releaseBody: |
            ## 重点更新

            - 新增自动更新能力，应用启动时可检查新版本，并支持下载、安装和重启生效。
            - 新增设置面板，可开启或关闭启动时自动检查更新，并支持手动检查更新。
            - 新增更新提示弹窗，展示新版本号、更新内容、下载状态和安装结果。
            - 修复 Tauri updater 发布配置，确保 release 生成可用的 `latest.json` 和签名更新包。
            - 修复生产环境更新检查判断，避免 Tauri 生产包被误判为开发环境而跳过更新。

            ## 下载

            请在下方 Assets 中下载对应系统安装包。
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  verify-updater:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify updater manifest
        run: |
          set -e
          TAG="v$(node -p "require('./package.json').version")"
          URL="https://github.com/qinant/dycast-desktop/releases/download/${TAG}/latest.json"
          curl -sfL "$URL" -o latest.json
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('latest.json', 'utf8'));
            const required = ['windows-x86_64', 'linux-x86_64', 'darwin-x86_64', 'darwin-aarch64'];
            for (const platform of required) {
              const entry = data.platforms?.[platform];
              if (!entry?.url || !entry?.signature) {
                console.error('Missing updater platform entry:', platform);
                process.exit(1);
              }
            }
            console.log('Verified updater manifest for', required.join(', '));
          "
